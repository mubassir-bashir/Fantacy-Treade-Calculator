name: Sync FantasyCalc Values

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        run: |
          curl -f -X GET "https://fantacy-treade-calculator.vercel.app/api/cron/sync-fantasycalc" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"